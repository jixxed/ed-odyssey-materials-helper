command: entrypoint

finish-args: []

desktop-file-edit:
  - --add-mime-type=x-scheme-handler/edomh

sources:
  - { type: file, dest-filename: program.zip, path: ../artifacts/update.zip }

  - type: script
    dest-filename: entrypoint
    commands:
      - |
        mkdir -p \
          "$HOME/.ed-odyssey-materials-helper" \
          "$XDG_STATE_HOME/log" \
          "$XDG_CACHE_HOME/javafx-cache-program"
      - |
        ln -st "$HOME/.ed-odyssey-materials-helper" \
          "$XDG_STATE_HOME/log" \
          "$XDG_CACHE_HOME/javafx-cache-program" \
          /app/update/*

      - ln -s "/app/share/applications/$FLATPAK_ID.desktop" "$HOME/.local/share/applications/edomh.desktop"
      - exec "$HOME/.ed-odyssey-materials-helper/bin/Elite Dangerous Odyssey Materials Helper" "$@"
