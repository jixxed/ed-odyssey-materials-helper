command: edomh-launcher

finish-args:
  - --persist=.ed-odyssey-materials-helper

desktop-file-edit:
  - --set-key=Exec
  - --set-value="edomh-launcher %u"

sources:
  - { type: file, dest-filename: program.zip, path: ../artifacts/launcher.zip }
  - { type: file, dest-filename: mime.desktop, path: edomh-mime.desktop }

  - type: script
    dest-filename: entrypoint
    commands:
      - |
        mkdir -p \
          "$HOME/.local/share/applications/" \
          "$XDG_STATE_HOME/log" \
          "$XDG_CACHE_HOME/javafx-cache-program"

      - ln -s "/app/share/applications/$FLATPAK_ID-mime.desktop" "$HOME/.local/share/applications/edomh.desktop"

      - |
        ln -st \
        "$HOME/.ed-odyssey-materials-helper" \
        "$XDG_STATE_HOME/log" \
        "$XDG_CACHE_HOME/javafx-cache-program"

      - exec "$@"

  - type: script
    dest-filename: edomh
    commands:
      - |
        entrypoint "$HOME/.ed-odyssey-materials-helper/bin/Elite Dangerous Odyssey Materials Helper" "$@"

  - type: script
    dest-filename: edomh-launcher
    commands:
      - |
        entrypoint "/app/launcher/bin/Elite Dangerous Odyssey Materials Helper Launcher" "$@"

metainfo:
  - tag: requires
    children:
      - tag: internet
        text: first-run
