command: edomh-launcher

entrypoint:
  - ln -sf "/app/share/applications/$FLATPAK_ID-mime.desktop" "$HOME/.local/share/applications/edomh.desktop"

finish-args:
  - --persist=.ed-odyssey-materials-helper

build-commands: []
post-install:
  # entrypoint is the launcher, so the url handler must be changed to the actual application
  - desktop-file-edit --remove-mime-type="x-scheme-handler/edomh" "$FLATPAK_DEST/share/applications/$FLATPAK_ID.desktop"

  # generate {{id}}-mime.desktop
  - |
    desktop_file="$FLATPAK_DEST/share/applications/$FLATPAK_ID-mime.desktop"

    appstreamcli make-desktop-file --exec="edomh %u" metainfo.xml "$desktop_file"

    desktop-file-edit                           \
                                                \
        --set-name="{{name}} URL Handler"       \
        --set-key=NoDisplay --set-value=true    \
                                                \
        "$desktop_file"

sources:
  - { type: file, dest-filename: program.zip, path: ../artifacts/launcher.zip }

  - type: script
    dest-filename: edomh
    commands:
      - /app/entrypoint "$HOME/.ed-odyssey-materials-helper/program/bin/Elite Dangerous Odyssey Materials Helper" "$@"

  - type: script
    dest-filename: edomh-launcher
    commands:
      - /app/entrypoint "/app/bin/Elite Dangerous Odyssey Materials Helper Launcher" "$@"

metainfo:
  - tag: requires
    children:
      - tag: internet
        text: first-run
  - tag: provides
    children:
      - tag: binary
        text: edomh-launcher
  - tag: launchable
    text: "{{id}}-mime.desktop"
    attrib:
      type: desktop-id
