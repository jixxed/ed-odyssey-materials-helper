tasks.register("wrapper", Wrapper) {
    gradleVersion = "9.3.0"
}

tasks.register('updateBrainTrees', UpdatePOI) {
    group = "edomh > download-poi"
    type = "Brain Trees"
    materials = new String[]{
            "Selenium",
            "Polonium",
            "Ruthenium",
            "Tellurium",
            "Technetium",
            "Yttrium",
            "Antimony"
    }
    outputFile = layout.buildDirectory.file("${project.projectDir}/src/main/resources/poi/braintrees.jsonl")
    outputs.upToDateWhen { false }
}
