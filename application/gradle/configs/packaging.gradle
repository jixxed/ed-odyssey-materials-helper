abstract class PatchInfoPlistTask extends DefaultTask {

    @Inject
    abstract ExecOperations getExecOperations()

    @TaskAction
    void patch() {

        File plistFile = project.layout.buildDirectory.file(
                "jpackage/Elite Dangerous Odyssey Materials Helper.app/Contents/Info.plist"
        ).get().asFile

        if (!plistFile.exists()) {
            throw new GradleException("Info.plist not found at: ${plistFile}")
        }

        String plistText = plistFile.getText("UTF-8")

        if (plistText.contains("<string>edomh</string>")) {
            logger.lifecycle("Info.plist already patched")
            return
        }

        String plistBuddy = "/usr/libexec/PlistBuddy"

        logger.lifecycle("Adding CFBundleURLTypes for edomh://")

        execOperations.exec {
            commandLine(
                    plistBuddy,
                    "-c", "Add :CFBundleURLTypes array",
                    "-c", "Add :CFBundleURLTypes:0 dict",
                    "-c", "Add :CFBundleURLTypes:0:CFBundleURLName string edomh",
                    "-c", "Add :CFBundleURLTypes:0:CFBundleURLSchemes array",
                    "-c", "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string edomh",
                    plistFile.absolutePath
            )
        }

        execOperations.exec {
            commandLine(
                    "plutil",
                    "-lint",
                    plistFile.absolutePath
            )
        }

        logger.lifecycle("Patched Info.plist: added CFBundleURLTypes (edomh)")
    }
}

tasks.register("patchInfoPlist", PatchInfoPlistTask) {
    description = "Patches Info.plist to register edomh:// URL scheme on macOS"
    group = "distribution"

    dependsOn(tasks.named("jpackage"))

    onlyIf {
        org.gradle.internal.os.OperatingSystem.current().isMacOsX()
    }
}
tasks.register("jpackageSigned") {
    dependsOn tasks.named("jpackage")
    dependsOn tasks.named("jpackageImage")
    finalizedBy tasks.named("signAppExe")
}

tasks.register('createSignCert') {
    doLast {
        String base64 = System.getProperty("base64_pfx") ?: ""

        byte[] decoded = Base64.getDecoder().decode(base64)

        new File("./edomh_codesigning.pfx").withOutputStream { stream ->
            stream.write(decoded)
        }
    }
}

tasks.register('signAppExe') {
    dependsOn tasks.named("createSignCert"), tasks.named("jpackage")
    doLast {
        File target = new File("application/build/jpackage/Elite Dangerous Odyssey Materials Helper/Elite Dangerous Odyssey Materials Helper.exe")
        target.setWritable(true)
        jsign(file: 'application/build/jpackage/Elite Dangerous Odyssey Materials Helper/Elite Dangerous Odyssey Materials Helper.exe',
                name: 'Elite Dangerous Odyssey Materials Helper',
                url: 'https://github.com/jixxed/ed-odyssey-materials-helper',
                keystore: 'edomh_codesigning.pfx',
                alias: System.getProperty("pfx_alias") ?: "NO_ALIAS",
                storepass: System.getProperty("pfx_password") ?: "NO_PASSWORD",
                storetype: 'PKCS12',
                tsaurl: 'http://timestamp.sectigo.com')
    }
}

tasks.register("signAppMacOs") {
    dependsOn "patchInfoPlist"
    doLast {
        def app = file("$buildDir/jpackage/Elite Dangerous Odyssey Materials Helper.app")

        exec {
            commandLine "codesign",
                    "--force",
                    "--deep",
                    "--sign", System.getenv("MAC_CODESIGN_IDENTITY"),
                    app
        }
    }
}

tasks.jpackageImage.doFirst {
    if (project.ext.os.isWindows()) {
        ant.attrib(readonly: false) {
            fileset(dir: 'build\\jpackage')
        }
    } else {
        ant.chmod(dir: 'build/jpackage', perm: 'ugo+w')
    }
    delete file('\\build\\jpackage\\').listFiles()
}

// jpackage should run tests on Windows before packaging
tasks.named("jpackage").configure {
    if (project.ext.os.isWindows()) {
        dependsOn tasks.named('test')
    }
}
