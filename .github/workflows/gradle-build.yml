name: Manual Build

on:
  workflow_dispatch:
    inputs:
      runTests:
        description: 'Run the test suite'
        type: boolean
        default: true
      storePackagesAsArtifacts:
        description: 'Upload packages as build artifacts'
        type: boolean
        default: true
      platform:
        description: 'Target platform'
        type: choice
        options: [all, linux, windows, macos]
        default: all
      version:
        description: 'Override version (leave empty to use gradle.properties)'
        type: string
        default: ''

env:
  JAVA_VERSION: 25.0.2

jobs:
  build:
    if: ${{ github.event.inputs.platform == 'all' || !github.event.inputs.platform || matrix.platform == github.event.inputs.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux
          - windows
          - macos
    runs-on: ${{ (matrix.platform == 'windows' && 'windows-latest') || (matrix.platform == 'macos' && 'macos-latest') || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download Zulu JDK
        id: download_zulu
        shell: bash
        run: |
          cd $RUNNER_TEMP
          os_name="${{ (matrix.platform == 'windows' && 'windows') || (matrix.platform == 'macos' && 'macos') || 'linux' }}"
          arch="${{ matrix.platform == 'macos' && 'aarch64' || 'x64' }}"
          url="https://api.azul.com/metadata/v1/zulu/packages/?os=${os_name}&arch=${arch}&archive_type=zip&java_package_type=jdk&javafx_bundled=false&crac_supported=false&release_status=ga&availability_types=CA&certifications=tck&java_version=${JAVA_VERSION}"
          download_url=$(curl -s "$url" -H 'accept: application/json' | jq -r '.[0].download_url')
          echo "Downloading JDK from: $download_url"
          jdk_archive_filename=$(curl -LOs -w '%{filename_effective}' "$download_url")
          echo "jdk_archive_filename=$jdk_archive_filename" >> $GITHUB_OUTPUT

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: |
            ${{ env.JAVA_VERSION }}
          distribution: jdkfile
          jdkFile: ${{ runner.temp }}/${{ steps.download_zulu.outputs.jdk_archive_filename }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Generate secrets file
        run: ./gradlew application:generateSecrets

      - name: Run tests
        if: ${{ github.event.inputs.runTests == 'true' }}
        run: ./gradlew test

      - name: Build release - Windows
        if: ${{ matrix.platform == 'windows' }}
        run: ./gradlew createReleaseWindowsUnsigned -DpackageType=msi -PskipSass${{ github.event.inputs.version != '' && format(' -Pversion={0}', github.event.inputs.version) || '' }}

      - name: Build release - Linux
        if: ${{ matrix.platform == 'linux' }}
        run: ./gradlew createReleaseLinuxDebAndZip createReleaseLinuxRpm -DpackageType=deb -PskipSass${{ github.event.inputs.version != '' && format(' -Pversion={0}', github.event.inputs.version) || '' }}

      - name: Build release - macOS
        if: ${{ matrix.platform == 'macos' }}
        run: ./gradlew createReleaseMacOsARM -DpackageType=dmg -PskipSass${{ github.event.inputs.version != '' && format(' -Pversion={0}', github.event.inputs.version) || '' }}

      - name: Upload packages as artifacts
        if: ${{ github.event.inputs.storePackagesAsArtifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.platform }}
          path: output/**
          retention-days: 30

      - name: Upload test reports
        if: ${{ github.event.inputs.runTests == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.platform }}
          path: '**/build/test-results/**/TEST-*.xml'
