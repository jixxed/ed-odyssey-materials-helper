name: Manual Build

on:
  workflow_dispatch:
    inputs:
      runTests:
        description: 'Run the test suite'
        type: boolean
        default: true
      storePackagesAsArtifacts:
        description: 'Upload packages as build artifacts'
        type: boolean
        default: true
      platform:
        description: 'Target platform'
        type: choice
        options: [all, linux, windows, macos]
        default: all
      version:
        description: 'Override version (leave empty to use gradle.properties)'
        type: string
        default: ''

env:
  JAVA_VERSION: 25.0.2

jobs:
  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || !github.event.inputs.platform || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Zulu JDK
        id: download_zulu
        shell: bash
        run: |
          cd $RUNNER_TEMP
          url="https://api.azul.com/metadata/v1/zulu/packages/?os=linux&arch=x64&archive_type=zip&java_package_type=jdk&javafx_bundled=false&crac_supported=false&release_status=ga&availability_types=CA&certifications=tck&java_version=${JAVA_VERSION}"
          download_url=$(curl -s "$url" -H 'accept: application/json' | jq -r '.[0].download_url')
          echo "Downloading JDK from: $download_url"
          jdk_archive_filename=$(curl -LOs -w '%{filename_effective}' "$download_url")
          echo "jdk_archive_filename=$jdk_archive_filename" >> $GITHUB_OUTPUT

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: |
            ${{ env.JAVA_VERSION }}
          distribution: jdkfile
          jdkFile: ${{ runner.temp }}/${{ steps.download_zulu.outputs.jdk_archive_filename }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Generate secrets file
        run: ./gradlew application:generateSecrets

      - name: Run tests
        if: ${{ github.event.inputs.runTests == 'true' }}
        run: ./gradlew test

      - name: Build release
        run: ./gradlew createReleaseLinuxDebAndZip createReleaseLinuxRpm -DpackageType=deb -PskipSass${{ github.event.inputs.version != '' && format(' -Pversion={0}', github.event.inputs.version) || '' }}

      - name: Upload packages as artifacts
        if: ${{ github.event.inputs.storePackagesAsArtifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: packages-linux
          path: output/**
          retention-days: 30

      - name: Upload test reports
        if: ${{ github.event.inputs.runTests == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-linux
          path: '**/build/test-results/**/TEST-*.xml'

  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || !github.event.inputs.platform || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Zulu JDK
        id: download_zulu
        shell: bash
        run: |
          cd $RUNNER_TEMP
          url="https://api.azul.com/metadata/v1/zulu/packages/?os=windows&arch=x64&archive_type=zip&java_package_type=jdk&javafx_bundled=false&crac_supported=false&release_status=ga&availability_types=CA&certifications=tck&java_version=${JAVA_VERSION}"
          download_url=$(curl -s "$url" -H 'accept: application/json' | jq -r '.[0].download_url')
          echo "Downloading JDK from: $download_url"
          jdk_archive_filename=$(curl -LOs -w '%{filename_effective}' "$download_url")
          echo "jdk_archive_filename=$jdk_archive_filename" >> $GITHUB_OUTPUT

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: |
            ${{ env.JAVA_VERSION }}
          distribution: jdkfile
          jdkFile: ${{ runner.temp }}/${{ steps.download_zulu.outputs.jdk_archive_filename }}

      - name: Generate secrets file
        run: ./gradlew application:generateSecrets

      - name: Run tests
        if: ${{ github.event.inputs.runTests == 'true' }}
        run: ./gradlew test

      - name: Build release
        run: ./gradlew createReleaseWindowsUnsigned -DpackageType=msi -PskipSass${{ github.event.inputs.version != '' && format(' -Pversion={0}', github.event.inputs.version) || '' }}

      - name: Upload packages as artifacts
        if: ${{ github.event.inputs.storePackagesAsArtifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: packages-windows
          path: output/**
          retention-days: 30

      - name: Upload test reports
        if: ${{ github.event.inputs.runTests == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-windows
          path: '**/build/test-results/**/TEST-*.xml'

  build-macos:
    if: ${{ github.event.inputs.platform == 'all' || !github.event.inputs.platform || github.event.inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Zulu JDK
        id: download_zulu
        shell: bash
        run: |
          cd $RUNNER_TEMP
          url="https://api.azul.com/metadata/v1/zulu/packages/?os=macos&arch=aarch64&archive_type=zip&java_package_type=jdk&javafx_bundled=false&crac_supported=false&release_status=ga&availability_types=CA&certifications=tck&java_version=${JAVA_VERSION}"
          download_url=$(curl -s "$url" -H 'accept: application/json' | jq -r '.[0].download_url')
          echo "Downloading JDK from: $download_url"
          jdk_archive_filename=$(curl -LOs -w '%{filename_effective}' "$download_url")
          echo "jdk_archive_filename=$jdk_archive_filename" >> $GITHUB_OUTPUT

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: |
            ${{ env.JAVA_VERSION }}
          distribution: jdkfile
          jdkFile: ${{ runner.temp }}/${{ steps.download_zulu.outputs.jdk_archive_filename }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Generate secrets file
        run: ./gradlew application:generateSecrets

      - name: Run tests
        if: ${{ github.event.inputs.runTests == 'true' }}
        run: ./gradlew test

      - name: Build release
        run: ./gradlew createReleaseMacOsARM -DpackageType=dmg -PskipSass${{ github.event.inputs.version != '' && format(' -Pversion={0}', github.event.inputs.version) || '' }}

      - name: Upload packages as artifacts
        if: ${{ github.event.inputs.storePackagesAsArtifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: packages-macos
          path: output/**
          retention-days: 30

      - name: Upload test reports
        if: ${{ github.event.inputs.runTests == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-macos
          path: '**/build/test-results/**/TEST-*.xml'
