name: Gradle Package

on:
  push:
    tags:
      - '*'

env:
  JAVA_VERSION: 25.0.2

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SENTRY_DSN: "${{secrets.SENTRY_DSN}}"
      EDDN_SOFTWARE_NAME: "${{secrets.EDDN_SOFTWARE_NAME}}"
      API_SERVICES_HOST: "${{secrets.API_SERVICES_HOST}}"
      BROKER_HOST: "${{secrets.BROKER_HOST}}"
      COMMODITY_HOST: "${{secrets.COMMODITY_HOST}}"
      CCID: "${{secrets.CCID}}"
      PROPRIETARY_REPO_USER: "${{secrets.PROPRIETARY_REPO_USER}}"
      PROPRIETARY_REPO_PASS: "${{secrets.PROPRIETARY_REPO_PASS}}"

    steps:
      - uses: olegtarasov/get-tag@v2.1.4
        id: tagName
      - uses: actions/checkout@v6
      - name: Download Zulu (without CRaC)
        id: download_zulu
        shell: bash
        run: |
          cd $RUNNER_TEMP
          jdk_archive_filename=$(curl -LOs -w '%{filename_effective}' "$(curl -s -X GET 'https://api.azul.com/metadata/v1/zulu/packages/?os=linux&arch=x64&archive_type=zip&java_package_type=jdk&javafx_bundled=false&crac_supported=false&release_status=ga&availability_types=CA&certifications=tck&java_version=${JAVA_VERSION}' -H  'accept: application/json' | jq -r '.[0].download_url')")
          echo "jdk_archive_filename=$jdk_archive_filename" >> $GITHUB_OUTPUT
      - name: Set up JDKS
        uses: actions/setup-java@v5
        with:
          java-version: |
            ${{ env.JAVA_VERSION }}
          distribution: jdkfile
          jdkFile: ${{ runner.temp }}/${{ steps.download_zulu.outputs.jdk_archive_filename }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      #      - name: Setup Gradle
      #        uses: gradle/actions/setup-gradle@v3
      - name: Generate secrets file
        run: ./gradlew application:generateSecrets
      - name: Build release with Gradle
        run: ./gradlew createReleaseLinux -DpackageType=deb -PskipSass
      - name: Build rpm Gradle
        run: ./gradlew createReleaseLinuxRpm -DpackageType=rpm -PskipSass
      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          allowUpdates: true
          draft: true
          omitBodyDuringUpdate: true
          bodyFile: ".github/releasenotes.MD"
          artifacts: "output/*.*"
          name: "Elite Dangerous Odyssey Materials Helper ${{ steps.tagName.outputs.tag }}"
  #      - name: VirusTotal Scan
  #        uses: crazy-max/ghaction-virustotal@v4
  #        with:
  #          vt_api_key: ${{ secrets.VIRUS_TOTAL_API_KEY }}
  #          update_release_body: true
  #          files: |
  #            output/*.*

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      SENTRY_DSN: "${{secrets.SENTRY_DSN}}"
      EDDN_SOFTWARE_NAME: "${{secrets.EDDN_SOFTWARE_NAME}}"
      API_SERVICES_HOST: "${{secrets.API_SERVICES_HOST}}"
      BROKER_HOST: "${{secrets.BROKER_HOST}}"
      COMMODITY_HOST: "${{secrets.COMMODITY_HOST}}"
      CCID: "${{secrets.CCID}}"
      PROPRIETARY_REPO_USER: "${{secrets.PROPRIETARY_REPO_USER}}"
      PROPRIETARY_REPO_PASS: "${{secrets.PROPRIETARY_REPO_PASS}}"

    steps:
      - uses: olegtarasov/get-tag@v2.1.4
        id: tagName
      - uses: actions/checkout@v6
      - name: Download Zulu (without CRaC)
        id: download_zulu
        shell: bash
        run: |
          cd $RUNNER_TEMP
          jdk_archive_filename=$(curl -LOs -w '%{filename_effective}' "$(curl -s -X GET 'https://api.azul.com/metadata/v1/zulu/packages/?os=windows&arch=x64&archive_type=zip&java_package_type=jdk&javafx_bundled=false&crac_supported=false&release_status=ga&availability_types=CA&certifications=tck&java_version=${JAVA_VERSION}' -H  'accept: application/json' | jq -r '.[0].download_url')")
          echo "jdk_archive_filename=$jdk_archive_filename" >> $GITHUB_OUTPUT
      - name: Set up JDKS
        uses: actions/setup-java@v5
        with:
          java-version: |
            ${{ env.JAVA_VERSION }}
          distribution: jdkfile
          jdkFile: ${{ runner.temp }}/${{ steps.download_zulu.outputs.jdk_archive_filename }}

      #      - name: Setup Gradle
      #        uses: gradle/actions/setup-gradle@v3

      - name: Generate secrets file
        run: ./gradlew application:generateSecrets
      - name: Build with Gradle
        run: ./gradlew createReleaseSigned -DpackageType=msi -Dpfx_alias="${{secrets.CODE_SIGN_CERT_ALIAS}}" -Dpfx_password='"${{secrets.CODE_SIGN_PASSWORD}}"' -Dbase64_pfx="${{secrets.CODE_SIGN_BASE64}}" -PskipSass
      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          allowUpdates: true
          draft: true
          bodyFile: ".github/releasenotes.MD"
          artifacts: "output/*.*"
          name: "Elite Dangerous Odyssey Materials Helper ${{ steps.tagName.outputs.tag }}"
      - name: VirusTotal Scan
        id: virustotal
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VIRUS_TOTAL_API_KEY }}
          files: |
            output/*.*

      - name: Append VirusTotal links to release notes
        env:
          ANALYSIS: ${{ steps.virustotal.outputs.analysis }}
        run: |
          echo "$ANALYSIS"
          echo -e "\n\n🛡 **VirusTotal Analysis:**\n$(echo "$ANALYSIS" | tr ',' '\n' | awk -F= '{fname=$1; sub(/^output\//, "", fname); sub(/^[^=]+=*/, "", $0); printf "[%s](%s)\n", fname, $0}')" >> .github/releasenotes.MD
        shell: bash

      - name: Update Release with VirusTotal links
        uses: ncipollo/release-action@v1.21.0
        with:
          allowUpdates: true
          draft: true
          bodyFile: ".github/releasenotes.MD"
          name: "Elite Dangerous Odyssey Materials Helper ${{ steps.tagName.outputs.tag }}"

  publish-release:
    runs-on: ubuntu-latest
    needs: [ build-windows, build-ubuntu ]
    permissions:
      contents: write
    steps:
      - name: Publish Release
        uses: ncipollo/release-action@v1.21.0
        with:
          allowUpdates: true
          draft: false
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          makeLatest: true

  sentry-release:
    runs-on: ubuntu-latest
    needs: [ build-windows, build-ubuntu ]
    permissions:
      contents: write
    steps:
      - uses: olegtarasov/get-tag@v2.1.4
        id: tagName
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: Production
          release: "edomh-app@${{ steps.tagName.outputs.tag }}"